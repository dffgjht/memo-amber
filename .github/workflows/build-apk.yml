name: Build Android APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'app/src/**'
      - 'build.gradle.kts'
      - 'app/build.gradle.kts'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Build Release APK
      run: ./gradlew assembleRelease --stacktrace

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/apk/release/app-release-unsigned.apk
        retention-days: 30

    - name: Get APK size
      run: |
        echo "## APK 文件信息" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Debug 版本" >> $GITHUB_STEP_SUMMARY
        ls -lh app/build/outputs/apk/debug/app-debug.apk >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Release 版本" >> $GITHUB_STEP_SUMMARY
        ls -lh app/build/outputs/apk/release/app-release-unsigned.apk >> $GITHUB_STEP_SUMMARY

  # 可选：签名 Release APK
  sign-release:
    name: Sign Release APK
    runs-on: ubuntu-latest
    needs: build
    if: false  # 设置为 true 以启用（需要配置密钥）

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download Release APK
      uses: actions/download-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/apk/release

    - name: Sign APK
      run: |
        # 这里需要使用 apksigner 或 jarsigner
        # 需要先配置密钥库
        echo "APK 签名功能需要配置密钥库"
        # 示例：
        # $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
        #   --ks ${{ secrets.KEYSTORE_FILE }} \
        #   --ks-key-alias ${{ secrets.KEY_ALIAS }} \
        #   --ks-pass env:KEYSTORE_PASSWORD \
        #   --key-pass env:KEY_PASSWORD \
        #   --out app-release-signed.apk \
        #   app/build/outputs/apk/release/app-release-unsigned.apk

    - name: Upload Signed APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release-signed
        path: app-release-signed.apk
        retention-days: 90
